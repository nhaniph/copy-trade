<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TR Trades — Ideas</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">TR Trades</div>
      <nav>
        <a href="/watchlist" class="nav-item">👁 Watchlist</a>
        <a href="/results" class="nav-item">📈 Results</a>
        <a href="/ideas" class="nav-item active">💡 Ideas</a>
      </nav>
    </aside>

    <main class="content">
      <h1 class="page-title">Trade Ideas</h1>

      <!-- Filters -->
      <div class="filters">
        <input type="text" id="filter-pair" placeholder="Filter by symbol..." class="filter-input" />
        <select id="filter-status" class="filter-select">
          <option value="">All statuses</option>
          <option value="idea">Idea</option>
          <option value="open">Open</option>
          <option value="cancelled">Cancelled</option>
          <option value="closed_win">Win</option>
          <option value="closed_loss">Loss</option>
        </select>
        <button class="btn" onclick="loadIdeas(1)">Filter</button>
        <span class="total-count" id="total-count"></span>
      </div>

      <!-- Cards grid -->
      <div class="ideas-grid" id="ideas-grid"></div>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>
    </main>
  </div>

  <script src="/static/ideas.js"></script>
</body>
</html>
